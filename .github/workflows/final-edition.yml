name: Upload Final Edition to Supabase

on:
  push:
    paths:
      - 'final_edition.txt'   # Hanya jalan jika file ini berubah
  workflow_dispatch:          # Bisa juga dijalankan manual

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase

      - name: Run upload script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python upload_final_to_supabase.py

      - name: Kirim notifikasi ke Telegram (opsional)
        run: |
          if [ -f final_edition.txt ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="✅ final_edition.txt berhasil diupload ke Supabase!"
          fi
