name: Upload Final Edition from Issue

on:
  issues:
    types: [opened, edited]  # Jalan saat issue dibuat atau diedit

jobs:
  upload:
    # Hanya jalan jika issue punya label 'upload-final'
    if: contains(github.event.issue.labels.*.name, 'upload-final')
    runs-on: ubuntu-latest
    permissions:
      issues: write   # Agar bisa menambah komentar di issue
      contents: write # Agar bisa checkout dan commit (opsional)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase

      - name: Extract content from issue body
        id: extract
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          # Ekstrak konten di antara ```txt ... ```
          # Jika tidak ada code block, ambil seluruh body
          if echo "$BODY" | grep -q '```txt'; then
            echo "$BODY" | sed -n '/```txt/,/```/p' | grep -v '```' > final_edition.txt
          else
            echo "$BODY" > final_edition.txt
          fi
          echo "✅ Content extracted to final_edition.txt"

      - name: Run upload script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python upload_final_to_supabase.py

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `✅ **Edisi ${date} berhasil diupload ke Supabase!**\n\n📁 File: final_edition.txt\n🗄️ Database: The Quartr (Supabase)`
            });
